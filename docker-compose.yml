version: '3.8'

services:
  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      RELOAD: "False"
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    environment:
      REACT_APP_API_URL: http://localhost:8001
    ports:
      - "3000:80"
    depends_on:
      - backend
